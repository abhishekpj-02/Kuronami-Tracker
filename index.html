<!DOCTYPE html>
<html>
<head>
<title>Kuronami Tracker</title>

<style>
:root {
    --bg: #0b1120;
    --card: #1e293b;
    --accent: #ff4655;
    --gold: #facc15;
    --silver: #cbd5f5;
    --bronze: #b45309;
}

body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color:white;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    padding:15px 40px;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.logo {
    font-weight:bold;
    color:var(--accent);
}

/* HERO */
.hero {
    text-align:center;
    padding:60px 20px 30px 20px;
}

.hero h1 {
    font-size:42px;
    margin-bottom: 10px;
}

.hero span {
    color:var(--accent);
}

/* SEARCH */
.search input {
    padding:14px;
    width:320px;
    border-radius:10px;
    margin-top:20px;
    background: #1e293b;
    color: white;
    font-size: 15px;
    outline: none;
    border: 1px solid #334155;
    transition: border 0.3s;
}

.search input:focus {
    border: 1px solid var(--accent);
}

/* DASHBOARD */
.dashboard {
    max-width:1000px;
    margin: 20px auto;
    background:rgba(30,41,59,0.8);
    padding:20px;
    border-radius:12px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,70,85,0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popIn {
    from { opacity: 0; transform: translateY(-20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* TABS */
.tabs button {
    background:#020617;
    border:none;
    color:white;
    padding:10px;
    margin-right:5px;
    border-radius:6px;
    cursor:pointer;
}

.tabs button:hover {
    background:var(--accent);
}

/* STAT CARDS */
.cards {
    display:flex;
    gap:20px;
    justify-content:center;
    margin-top:30px;
    flex-wrap: wrap;
}

.card {
    width:200px;
    padding:20px;
    border-radius:12px;
    text-align:center;
    background:linear-gradient(145deg,#1e293b,#0f172a);
    box-shadow:0 0 10px rgba(255,70,85,0.2);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-8px) scale(1.05);
    box-shadow:0 0 25px rgba(255,70,85,0.6);
}

.rank1 { border:2px solid var(--gold); }
.rank2 { border:2px solid var(--silver); }
.rank3 { border:2px solid var(--bronze); }

.stat-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}

.stat {
    padding:15px;
    border-radius:10px;
    background:#020617;
    text-align:center;
}

.leaderboard-section {
    max-width: 1100px;
    margin: 40px auto 60px auto;
    padding: 30px;
    background: rgba(15, 23, 42, 0.6);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.05);
}

.section-title {
    font-size: 28px;
    text-align: center;
    margin-bottom: 5px;
}

.section-sub {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 30px;
}

.navbar button {
    border: 2px solid #ff4655;
    padding: 8px 14px;
    border-radius: 8px;
    font-weight: bold;
    background: transparent;
    color: white;
    cursor: pointer;
}

.navbar button.active {
    background: #ff4655;
}

.navbar button:hover {
    background: var(--accent);
}

table {
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
}

th, td {
    padding:12px;
    border-bottom:1px solid #334155;
    text-align:center;
}

tr:hover {
    background: rgba(255,255,255,0.05);
    cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Kuronami Tracker</div>
    <div>
        <button onclick="setMode('competitive')">Competitive</button>
        <button onclick="setMode('casual')">Casual</button>
        <a href="/admin" style="color:white;text-decoration:none;border:2px solid #ff4655;padding:8px 14px;border-radius:8px;font-weight:bold;margin-left:10px;">Admin</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Player Stats Tracker <span>by Kuronami</span></h1>
    <p>Track performance. Analyze stats. Dominate.</p>
    <div class="search">
        <input placeholder="Search player..." oninput="searchPlayer(this.value)">
    </div>
</div>

<!-- DASHBOARD (appears right below search on player select) -->
<div id="dashboard" class="dashboard" style="display:none;">
    <h2 id="playerName"></h2>
    <div class="tabs">
        <button onclick="loadTab('overview')">Overview</button>
        <button onclick="loadTab('matches')">Matches</button>
        <button onclick="loadTab('maps')">Maps</button>
        <button onclick="loadTab('performance')">Performance</button>
    </div>
    <div id="content"></div>
</div>

<!-- LEADERBOARD -->
<div class="section leaderboard-section">
    <h2 class="section-title">Top Players</h2>
    <p class="section-sub">Top fraggers dominating the lobby</p>
    <div id="leaderboard" class="cards"></div>
</div>

<script>
const API = "";
let players = [];
let currentPlayer = null;
let currentMode = "competitive";

function setMode(mode){
    currentMode = mode;
    document.querySelectorAll(".navbar button")
        .forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
    if(mode === "competitive"){
        document.body.style.background = "radial-gradient(circle at top, #0f172a, #020617)";
    } else {
        document.body.style.background = "linear-gradient(120deg, #1e293b, #334155)";
    }
}

async function loadLeaderboard() {
    let res = await fetch(API + "/leaderboard");
    let data = await res.json();
    let html = `<table><tr><th>Rank</th><th>Player</th><th>Kills</th></tr>`;
    data.forEach((p, i) => {
        html += `<tr onclick="selectPlayerByName('${p.name}')">
            <td>#${i + 1}</td><td>${p.name}</td><td>${p.total_kills}</td>
        </tr>`;
    });
    html += "</table>";
    document.getElementById("leaderboard").innerHTML = html;
}

async function searchPlayer(name) {
    if(name.length < 1) {
        document.getElementById("dashboard").style.display = "none";
        return;
    }
    let res = await fetch(API + "/search?name=" + name);
    let data = await res.json();
    if(data.length > 0){
        selectPlayer(data[0].player_id, data[0].name);
    }
}

function selectPlayer(id, name) {
    currentPlayer = id;
    document.getElementById("playerName").innerText = name;
    document.getElementById("dashboard").style.display = "block";
    loadTab("overview");
}

async function selectPlayerByName(name){
    let res = await fetch(API + "/search?name=" + name);
    let data = await res.json();
    selectPlayer(data[0].player_id, name);
    document.getElementById("dashboard").scrollIntoView({ behavior: "smooth" });
}

async function loadTab(tab) {
    let res = await fetch(`${API}/player/${currentPlayer}/${tab}`);
    let data = await res.json();
    let html = "";

    if (tab === "overview") {
        html = `<div class="cards">
            <div class="card">Matches<br>${data.matches}</div>
            <div class="card">Kills<br>${data.kills}</div>
            <div class="card">Deaths<br>${data.deaths}</div>
            <div class="card">K/D<br>${data.kd_ratio}</div>
            <div class="card">Win Rate<br>${(data.win_rate * 100).toFixed(1)}%</div>
        </div>`;
    } else if (tab === "matches") {
        html = "<table><tr><th>Map</th><th>K/D/A</th><th>Result</th></tr>";
        data.forEach(m => {
            html += `<tr><td>${m.map}</td><td>${m.kills}/${m.deaths}/${m.assists}</td><td>${m.result}</td></tr>`;
        });
        html += "</table>";
    } else if (tab === "maps") {
        html = "<table><tr><th>Map Name</th><th>Played</th><th>Win Rate</th></tr>";
        data.forEach(m => {
            html += `<tr><td>${m.map}</td><td>${m.matches}</td><td>${(m.win_rate * 100).toFixed(0)}%</td></tr>`;
        });
        html += "</table>";
    } else if (tab === "performance") {
        html = `<div class="stat-grid">
            <div class="stat"><h3>Avg Kills</h3><p>${data.avg_kills}</p></div>
            <div class="stat"><h3>Avg Deaths</h3><p>${data.avg_deaths}</p></div>
            <div class="stat"><h3>Avg Assists</h3><p>${data.avg_assists}</p></div>
        </div>`;
    }

    document.getElementById("content").innerHTML = html;
}

loadLeaderboard();
</script>

</body>
</html>
